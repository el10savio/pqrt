global:
  scrape_interval: 5s

scrape_configs:
  # Both jobs use Docker service discovery so every replica is scraped as its
  # own target. Without this, a scaled service resolves to one round-robined
  # container per scrape and the per-container series flap. Each target's
  # `instance` label is set to the container name (e.g. prqt-consumer-2).
  - job_name: producer
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: producer
        action: keep
      - source_labels: [__meta_docker_port_private]
        regex: "2112"
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: instance
        replacement: "$1"

  - job_name: consumer
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: consumer
        action: keep
      - source_labels: [__meta_docker_port_private]
        regex: "2113"
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: instance
        replacement: "$1"
